name: Update Formula

on:
  repository_dispatch:
    types: [update-formula]

jobs:
  update:
    # macOS required for brew audit
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update formula version and checksum
        env:
          VERSION: ${{ github.event.client_payload.version }}
        run: |
          URL="https://github.com/michaeldhopkins/branchdiff/archive/refs/tags/v${VERSION}.tar.gz"
          SHA256=$(curl -sL "$URL" | shasum -a 256 | awk '{print $1}')

          URL="$URL" SHA256="$SHA256" ruby -e '
            url = ENV["URL"]
            sha = ENV["SHA256"]
            path = "Formula/branchdiff.rb"
            content = File.read(path)
            content.sub!(/url "https:\/\/github\.com\/michaeldhopkins\/branchdiff\/archive\/refs\/tags\/v[^"]*\.tar\.gz"/, "url \"#{url}\"")
            content.sub!(/sha256 "[^"]*"/, "sha256 \"#{sha}\"")
            File.write(path, content)
          '

      - name: Audit formula
        run: |
          brew update
          brew tap michaeldhopkins/tap
          cp Formula/branchdiff.rb "$(brew --repo michaeldhopkins/tap)/Formula/branchdiff.rb"
          brew audit --strict branchdiff

      - name: Commit and push
        env:
          VERSION: ${{ github.event.client_payload.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/branchdiff.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update branchdiff to v${VERSION}"
          git push
