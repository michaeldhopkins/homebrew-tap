name: Update Formula

on:
  repository_dispatch:
    types: [update-formula]

permissions:
  contents: write

jobs:
  update:
    # macOS required for brew audit
    runs-on: macos-latest
    env:
      FORMULA: ${{ github.event.client_payload.formula }}
      REPO: ${{ github.event.client_payload.repo }}
      VERSION: ${{ github.event.client_payload.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate payload
        run: |
          if [ -z "$FORMULA" ] || [ -z "$REPO" ] || [ -z "$VERSION" ]; then
            echo "::error::Missing required payload fields: formula='$FORMULA' repo='$REPO' version='$VERSION'"
            exit 1
          fi
          if [ ! -f "Formula/${FORMULA}.rb" ]; then
            echo "::error::Formula file Formula/${FORMULA}.rb not found"
            exit 1
          fi

      - name: Update formula version and checksum
        run: |
          URL="https://github.com/${REPO}/archive/refs/tags/v${VERSION}.tar.gz"
          SHA256=$(curl -sL "$URL" | shasum -a 256 | awk '{print $1}')

          FORMULA="$FORMULA" URL="$URL" SHA256="$SHA256" ruby -e '
            formula = ENV["FORMULA"]
            url = ENV["URL"]
            sha = ENV["SHA256"]
            path = "Formula/#{formula}.rb"
            content = File.read(path)
            content.sub!(/url "https:\/\/github\.com\/[^"]*\.tar\.gz"/, "url \"#{url}\"")
            content.sub!(/sha256 "[^"]*"/, "sha256 \"#{sha}\"")
            File.write(path, content)
          '

      - name: Run post_install tests
        run: ruby test_post_install.rb

      - name: Audit formula
        run: |
          brew update
          brew tap michaeldhopkins/tap
          cp "Formula/${FORMULA}.rb" "$(brew --repo michaeldhopkins/tap)/Formula/${FORMULA}.rb"
          brew audit --strict "$FORMULA"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "Formula/${FORMULA}.rb"
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update ${FORMULA} to v${VERSION}"
          git push
